<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>인권 침해 사례 탐구</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --surface2: #f9f9f8;
      --border: #e0dfd9;
      --border-strong: #c8c7c0;
      --text: #1a1a18;
      --text-sub: #5c5c58;
      --text-muted: #9a9a94;
      --accent: #2563eb;
      --accent-bg: #eff6ff;
      --accent-border: #bfdbfe;
      --accent-text: #1d4ed8;
      --success-bg: #f0fdf4;
      --success-text: #166534;
      --danger-bg: #fef2f2;
      --danger-text: #991b1b;
      --danger-border: #fecaca;
      --warning-bg: #fffbeb;
      --warning-text: #92400e;
      --pro-bg: #f5f3ff;
      --pro-text: #5b21b6;
      --pro-border: #ddd6fe;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem 1rem 3rem;
    }

    .wrap { max-width: 720px; margin: 0 auto; }

    .header { margin-bottom: 1.5rem; }
    .header h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .header p { font-size: 14px; color: var(--text-sub); }

    /* 탭 */
    .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; gap: 0; }
    .tab {
      padding: 10px 18px; font-size: 14px; font-weight: 500;
      color: var(--text-sub); background: none; border: none;
      border-bottom: 2.5px solid transparent; cursor: pointer; margin-bottom: -1px;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }

    .page { display: none; }
    .page.on { display: block; }

    /* 카드 그리드 */
    .case-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px; margin-bottom: 1rem;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem; cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .card:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(37,99,235,0.1); }
    .card.sel { border: 2px solid var(--accent); background: var(--accent-bg); }

    .pill {
      display: inline-block; font-size: 11px; font-weight: 600;
      padding: 3px 9px; border-radius: 99px; margin-bottom: 8px;
    }
    .pill-danger { background: var(--danger-bg); color: var(--danger-text); }
    .pill-warning { background: var(--warning-bg); color: var(--warning-text); }
    .pill-success { background: var(--success-bg); color: var(--success-text); }
    .pill-accent  { background: var(--accent-bg);  color: var(--accent-text);  }
    .pill-pro     { background: var(--pro-bg);      color: var(--pro-text);     }

    .ctitle { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .cprev  { font-size: 12px; color: var(--text-sub); line-height: 1.5; }

    /* 사례 상세 */
    .detail {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem;
    }
    .detail-title { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
    .dstep { display: flex; gap: 12px; margin-bottom: 12px; }
    .dnum {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
    }
    .dnum-1 { background: var(--danger-bg); color: var(--danger-text); }
    .dnum-2 { background: var(--warning-bg); color: var(--warning-text); }
    .dnum-3 { background: var(--success-bg); color: var(--success-text); }
    .dlabel { font-size: 12px; font-weight: 600; margin-bottom: 3px; }
    .dlabel-1 { color: var(--danger-text); }
    .dlabel-2 { color: var(--warning-text); }
    .dlabel-3 { color: var(--success-text); }
    .dtext { font-size: 13px; color: var(--text-sub); line-height: 1.7; }

    /* 의견 쓰기 */
    .qbox {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.25rem; margin-bottom: 12px;
    }
    .qlabel { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .qhint  { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }

    select, input[type=text], input[type=password] {
      height: 38px; border-radius: var(--radius);
      border: 1px solid var(--border); padding: 0 12px;
      font-size: 13px; font-family: inherit; color: var(--text);
      background: var(--surface2);
    }
    select:focus, input:focus { outline: none; border-color: var(--accent); }

    textarea {
      width: 100%; resize: vertical; border-radius: var(--radius);
      border: 1px solid var(--border); padding: 10px 12px;
      font-size: 13px; font-family: inherit; color: var(--text);
      background: var(--surface2); min-height: 76px; line-height: 1.6;
    }
    textarea:focus { outline: none; border-color: var(--accent); }

    /* 버튼 */
    .btn {
      border-radius: var(--radius); padding: 9px 20px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: opacity 0.1s;
    }
    .btn:active { opacity: 0.8; }
    .btn-p { background: var(--accent); color: #fff; border: none; }
    .btn-s { background: none; color: var(--accent); border: 1px solid var(--accent-border); }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-danger { background: none; color: var(--danger-text); border: 1px solid var(--danger-border); }

    /* 게시물 */
    .posts { display: grid; gap: 10px; }
    .post {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem;
    }
    .phead { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
    .pname { font-size: 13px; font-weight: 600; }
    .pq   { font-size: 12px; color: var(--text-muted); margin-top: 8px; margin-bottom: 3px; }
    .pa   { font-size: 13px; color: var(--text-sub); line-height: 1.65; }
    .pt   { font-size: 11px; color: var(--text-muted); margin-top: 8px; }

    .empty { text-align: center; padding: 3rem 1rem; font-size: 14px; color: var(--text-muted); line-height: 1.8; }

    /* 교사 통계 */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .stat-item { text-align: center; }
    .stat-num  { font-size: 28px; font-weight: 700; color: var(--pro-text); }
    .stat-label{ font-size: 12px; color: var(--text-sub); margin-top: 2px; }

    .teacher-badge {
      background: var(--pro-bg); color: var(--pro-text);
      border: 1px solid var(--pro-border); border-radius: 99px;
      font-size: 11px; font-weight: 600; padding: 2px 8px; margin-left: 4px;
    }
    .teacher-box {
      background: var(--pro-bg); border: 1px solid var(--pro-border);
      border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.25rem;
    }

    .ok-msg { font-size: 13px; color: var(--success-text); margin-top: 10px; display: none; }

    .lock-wrap { text-align: center; padding: 4rem 1rem; }
    .lock-icon { font-size: 44px; margin-bottom: 14px; }
    .lock-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .lock-sub { font-size: 13px; color: var(--text-sub); margin-bottom: 22px; }
    .pw-input {
      width: 140px; text-align: center; letter-spacing: 6px;
      font-size: 20px; height: 46px;
    }
    .pw-err { font-size: 12px; color: var(--danger-text); margin-top: 8px; min-height: 18px; }

    @media (max-width: 480px) {
      .tab { padding: 8px 12px; font-size: 13px; }
      .case-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>인권 침해 사례 탐구</h1>
    <p>사례를 읽고, 내 생각을 기록하고, 친구들과 나눠요</p>
  </div>

  <div class="tabs">
    <button class="tab active" id="t0">사례 탐색</button>
    <button class="tab" id="t1">내 의견 쓰기</button>
    <button class="tab" id="t2">학급 게시판</button>
    <button class="tab" id="t3">선생님 보기 <span class="teacher-badge">교사</span></button>
  </div>

  <!-- 탐색 -->
  <div class="page on" id="p0">
    <p style="font-size:13px;color:var(--text-sub);margin-bottom:12px;">사례 카드를 눌러서 자세히 살펴보세요</p>
    <div class="case-grid" id="caseGrid"></div>
    <div id="caseDetail"></div>
    <div style="margin-top:12px;">
      <button class="btn btn-s" id="writeBtn" style="display:none;">이 사례로 의견 쓰기 →</button>
    </div>
  </div>

  <!-- 의견 쓰기 -->
  <div class="page" id="p1">
    <div class="qbox">
      <div class="qlabel">어떤 사례에 대해 쓸 건가요?</div>
      <select id="caseSelect" style="width:100%;"></select>
    </div>
    <div class="qbox">
      <div class="qlabel">① 이 사례에서 어떤 인권이 침해되었나요?</div>
      <div class="qhint">배운 내용을 떠올리며 써보세요</div>
      <textarea id="ans1" placeholder="예: 이 사례에서는 평등권이 침해되었습니다. 왜냐하면..."></textarea>
    </div>
    <div class="qbox">
      <div class="qlabel">② 나라면 이 문제를 어떻게 해결하고 싶나요?</div>
      <div class="qhint">현실적인 방법이든 상상 속 방법이든 자유롭게 써보세요</div>
      <textarea id="ans2" placeholder="예: 저는 법을 만들어서..."></textarea>
    </div>
    <div class="qbox" style="margin-bottom:1rem;">
      <div class="qlabel">③ 이 사례를 보고 느낀 점을 한 문장으로 써보세요</div>
      <textarea id="ans3" placeholder="예: 이 사례를 보고 나는..." style="min-height:56px;"></textarea>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:1rem;">
      <span style="font-size:13px;color:var(--text-sub);white-space:nowrap;">이름</span>
      <input type="text" id="studentName" placeholder="이름을 입력하세요" maxlength="10" style="flex:1;"/>
    </div>
    <button class="btn btn-p" id="submitBtn">게시판에 올리기</button>
    <div class="ok-msg" id="okMsg">✓ 게시판에 올렸어요!</div>
  </div>

  <!-- 게시판 -->
  <div class="page" id="p2">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
      <span style="font-size:13px;color:var(--text-sub);">우리 반 친구들의 생각</span>
      <select id="filterCase" style="font-size:12px;height:32px;"></select>
    </div>
    <div class="posts" id="boardList"></div>
  </div>

  <!-- 선생님 -->
  <div class="page" id="p3">
    <div id="lockScreen">
      <div class="lock-wrap">
        <div class="lock-icon">🔒</div>
        <div class="lock-title">선생님 전용 공간</div>
        <div class="lock-sub">비밀번호를 입력해주세요</div>
        <input type="password" class="pw-input" id="pwInput" maxlength="6" placeholder="••••"/>
        <div class="pw-err" id="pwErr"></div>
        <div style="margin-top:14px;"><button class="btn btn-p" id="pwBtn">확인</button></div>
      </div>
    </div>
    <div id="teacherContent" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span style="font-size:14px;font-weight:600;">교사용 현황판</span>
        <button class="btn btn-s btn-sm" id="lockBtn">잠금</button>
      </div>
      <div class="teacher-box">
        <div style="font-size:13px;font-weight:600;color:var(--pro-text);margin-bottom:10px;">전체 요약</div>
        <div class="stat-grid" id="tStats"></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <span style="font-size:13px;font-weight:600;">전체 제출 현황</span>
        <button class="btn btn-danger btn-sm" id="clearBtn">전체 삭제</button>
      </div>
      <div class="posts" id="teacherList"></div>
    </div>
  </div>
</div>

<script>
// =========================================================
// 사례 데이터 — 여기서 내용을 수정/추가할 수 있어요
// =========================================================
const CASES = [
  {
    id: 1, title: "공장 어린이 노동자", tag: "노동권", pill: "pill-danger",
    prev: "19세기 영국 공장에서 일했던 아이들의 이야기",
    what: "19세기 영국 산업혁명 시기, 5~10세 어린이들이 하루 12~16시간씩 탄광과 방직 공장에서 일했습니다. 위험한 기계 옆에서 쉬지도 못하고 일해야 했으며, 제대로 된 임금도 받지 못했습니다.",
    why: "어린이에게는 교육받을 권리, 쉴 권리, 안전하게 생활할 권리가 있습니다. 이 어린이들은 이 모든 권리를 빼앗겼습니다. 유엔 아동권리협약은 어린이의 노동 착취를 명백한 인권 침해로 규정합니다.",
    how: "영국에서는 시민들의 꾸준한 요구로 1833년 공장법이 제정되어 9세 미만 어린이의 고용이 금지되었습니다. 이후 의무교육법도 만들어졌습니다. 오늘날 국제노동기구(ILO)는 아동 노동 금지 협약을 통해 전 세계 어린이를 보호하고 있습니다."
  },
  {
    id: 2, title: "버스 뒤편 강요 사건", tag: "평등권", pill: "pill-danger",
    prev: "1955년 미국에서 일어난 인종 차별 이야기",
    what: "1955년 미국 앨라배마주에서 흑인 여성 로자 파크스는 버스에서 백인 승객에게 자리를 양보하라는 요구를 거부했다가 체포되었습니다. 당시 법률은 흑인과 백인이 버스의 다른 구역에 앉도록 강제하고 있었습니다.",
    why: "피부색을 이유로 사람을 다르게 대우하는 것은 모든 사람이 평등하게 존중받을 권리를 침해합니다. 세계인권선언 제1조는 '모든 인간은 태어날 때부터 자유롭고 동등한 존엄성과 권리를 가진다'고 명시합니다.",
    how: "이 사건은 381일간의 몽고메리 버스 보이콧 운동으로 이어졌습니다. 마틴 루터 킹 목사가 이 운동을 이끌었고, 결국 미국 대법원은 버스 내 인종 분리가 헌법에 위반된다고 판결했습니다."
  },
  {
    id: 3, title: "말랄라의 교육권 투쟁", tag: "교육권", pill: "pill-warning",
    prev: "학교 가는 것을 금지당한 파키스탄 소녀의 이야기",
    what: "2009년 파키스탄에서 탈레반은 여자 어린이들의 학교 출석을 금지했습니다. 당시 11살이었던 말랄라 유사프자이는 이에 굴하지 않고 계속 학교에 다녔고, 블로그와 인터뷰를 통해 여성 교육권을 알렸습니다. 2012년 탈레반은 학교 버스에서 말랄라에게 총을 쏘았습니다.",
    why: "교육은 모든 사람이 누려야 할 기본 권리입니다. 성별을 이유로 교육받을 기회를 빼앗는 것은 심각한 인권 침해입니다. 유엔 아동권리협약 제28조는 모든 어린이의 교육권을 보장합니다.",
    how: "말랄라는 기적적으로 회복해 더 강하게 목소리를 높였습니다. 2013년 유엔에서 연설했고, 2014년 17세의 나이로 최연소 노벨평화상을 받았습니다. '말랄라 기금'을 세워 전 세계 여아 교육을 위해 활동하고 있습니다."
  },
  {
    id: 4, title: "장애인 접근권 차별", tag: "접근권", pill: "pill-success",
    prev: "휠체어 사용자가 건물에 들어갈 수 없었던 이야기",
    what: "1970~80년대 미국에서 휠체어를 사용하는 장애인들은 계단만 있는 건물 때문에 관공서, 학교, 식당 등 많은 곳에 출입할 수 없었습니다. 장애인 권리 운동가들은 1990년 의회 건물 앞 계단을 기어오르는 퍼포먼스로 사회의 관심을 끌었습니다.",
    why: "장애가 있다는 이유로 공공장소에 접근하지 못하는 것은 이동의 자유, 평등권, 사회 참여의 권리를 침해합니다. 장애는 불편한 환경이 만드는 것이지 사람의 능력 문제가 아닙니다.",
    how: "1990년 미국 장애인법(ADA)이 제정되어 모든 공공건물에 경사로, 엘리베이터, 장애인 화장실 설치가 의무화되었습니다. 한국에서도 1998년 장애인·노인·임산부 등의 편의증진 보장에 관한 법률이 만들어졌습니다."
  },
  {
    id: 5, title: "나이를 이유로 한 취업 거부", tag: "나이 차별", pill: "pill-accent",
    prev: "나이가 많다는 이유만으로 일할 기회를 빼앗긴 이야기",
    what: "많은 기업들이 구인 공고에 '35세 이하'처럼 나이 제한을 명시하거나, 면접에서 나이가 많다는 이유만으로 능력과 관계없이 탈락시키는 일이 빈번하게 일어났습니다. 한국에서도 50대 이상 구직자들이 이력서조차 검토받지 못하는 사례가 다수 보고되었습니다.",
    why: "일할 능력이 있음에도 나이만을 이유로 기회를 주지 않는 것은 평등권과 노동권을 침해합니다. 사람의 가치와 능력은 나이로 결정되지 않으며, 나이를 이유로 한 차별은 국제적으로도 인권 침해로 인정됩니다.",
    how: "한국에서는 2009년 '고용상 연령차별 금지 및 고령자 고용 촉진에 관한 법률'이 강화되어 채용 공고에 나이 제한을 명시하는 것이 금지되었습니다. 미국, 유럽 등지에서도 유사한 법률이 존재하며, 능력 중심의 채용 문화를 확산시키기 위한 캠페인이 이어지고 있습니다."
  },
  {
    id: 6, title: "외모를 이유로 한 따돌림", tag: "신체 차별", pill: "pill-pro",
    prev: "외모가 다르다는 이유로 차별받은 사람들의 이야기",
    what: "피부색이 다르거나, 키가 작거나, 몸무게가 많이 나가거나, 신체적 특징이 남들과 다르다는 이유로 학교나 직장에서 놀림, 따돌림, 부당한 대우를 받는 일이 세계 곳곳에서 일어납니다. 연구에서 외모로 인한 차별이 취업, 급여, 대인관계 전반에 영향을 미친다는 것이 확인되었습니다.",
    why: "사람의 외모는 스스로 선택한 것이 아닌 경우가 대부분이며, 외모를 이유로 사람을 다르게 대우하는 것은 인간의 존엄성과 평등권을 침해합니다. 모든 사람은 생김새와 관계없이 동등하게 존중받을 권리가 있습니다.",
    how: "여러 나라에서 외모 차별 금지 조항을 법에 추가하는 논의가 이루어지고 있습니다. 학교에서는 외모 차별 예방 교육을 실시하고, 다양한 외모를 있는 그대로 존중하는 사회 분위기를 만들어가는 노력이 이어지고 있습니다."
  }
];

// =========================================================
// 비밀번호 — 여기서 변경하세요
// =========================================================
const TEACHER_PW = "0727";

// =========================================================
// 데이터 저장 (localStorage 사용 — 같은 기기/브라우저 내 유지)
// =========================================================
const STORAGE_KEY = "hr_posts_v1";

function loadPosts() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; }
}
function savePosts() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(posts)); } catch {}
}

let posts = loadPosts();
let unlocked = false;

// =========================================================
// 탭 전환
// =========================================================
function go(idx) {
  document.querySelectorAll(".tab").forEach((t, i) => t.classList.toggle("active", i === idx));
  document.querySelectorAll(".page").forEach((p, i) => p.classList.toggle("on", i === idx));
  if (idx === 2) renderBoard();
  if (idx === 3) renderTeacher();
}

// =========================================================
// 사례 카드 & 상세
// =========================================================
function buildCaseOptions(selId, withAll) {
  const el = document.getElementById(selId);
  el.innerHTML = withAll ? "<option value=''>전체 사례</option>" : "<option value=''>사례를 선택하세요</option>";
  CASES.forEach(c => { el.innerHTML += `<option value="${c.id}">${c.title}</option>`; });
}

function selectCase(id) {
  document.querySelectorAll(".card").forEach(el => el.classList.remove("sel"));
  const card = document.getElementById("c" + id);
  if (card) card.classList.add("sel");
  const c = CASES.find(x => x.id === id);
  document.getElementById("caseDetail").innerHTML = `
    <div class="detail">
      <div class="detail-title">${c.title}</div>
      <div class="dstep">
        <div class="dnum dnum-1">1</div>
        <div><div class="dlabel dlabel-1">무슨 일이 있었나요?</div><div class="dtext">${c.what}</div></div>
      </div>
      <div class="dstep">
        <div class="dnum dnum-2">2</div>
        <div><div class="dlabel dlabel-2">왜 인권 침해인가요?</div><div class="dtext">${c.why}</div></div>
      </div>
      <div class="dstep" style="margin-bottom:0;">
        <div class="dnum dnum-3">3</div>
        <div><div class="dlabel dlabel-3">어떻게 해결되었나요?</div><div class="dtext">${c.how}</div></div>
      </div>
    </div>`;
  document.getElementById("writeBtn").style.display = "inline-block";
  document.getElementById("caseSelect").value = id;
}

// =========================================================
// 게시물 HTML
// =========================================================
function postHTML(p) {
  const c = CASES.find(x => x.id === p.caseId) || {};
  const pill = c.pill || "pill-accent";
  const tag  = c.tag  || "";
  const title = c.title || p.caseTitle || "";
  let body = "";
  if (p.a1) body += `<div class="pq">침해된 인권</div><div class="pa">${p.a1}</div>`;
  if (p.a2) body += `<div class="pq">나의 해결 방법</div><div class="pa">${p.a2}</div>`;
  if (p.a3) body += `<div class="pq">느낀 점</div><div class="pa">${p.a3}</div>`;
  const time = new Date(p.time).toLocaleString("ko-KR", { month:"numeric", day:"numeric", hour:"2-digit", minute:"2-digit" });
  return `<div class="post">
    <div class="phead">
      <span class="pname">${p.name}</span>
      <span class="pill ${pill}">${tag} · ${title}</span>
    </div>${body}
    <div class="pt">${time}</div>
  </div>`;
}

// =========================================================
// 게시판 렌더링
// =========================================================
function renderBoard() {
  const filter = document.getElementById("filterCase").value;
  const filtered = filter ? posts.filter(p => p.caseId == filter) : posts;
  document.getElementById("boardList").innerHTML = filtered.length
    ? filtered.map(postHTML).join("")
    : '<div class="empty">아직 올라온 의견이 없어요.<br>첫 번째로 의견을 남겨보세요!</div>';
}

// =========================================================
// 교사 탭 렌더링
// =========================================================
function renderTeacher() {
  if (!unlocked) return;
  const total = posts.length;
  const names = new Set(posts.map(p => p.name)).size;
  const cases = new Set(posts.map(p => p.caseId)).size;
  document.getElementById("tStats").innerHTML = `
    <div class="stat-item"><div class="stat-num">${total}</div><div class="stat-label">전체 제출</div></div>
    <div class="stat-item"><div class="stat-num">${names}</div><div class="stat-label">참여 학생</div></div>
    <div class="stat-item"><div class="stat-num">${cases}</div><div class="stat-label">다뤄진 사례</div></div>`;
  document.getElementById("teacherList").innerHTML = posts.length
    ? posts.map(postHTML).join("")
    : '<div class="empty">아직 제출된 의견이 없습니다</div>';
}

// =========================================================
// 비밀번호 확인
// =========================================================
function checkPw() {
  if (document.getElementById("pwInput").value === TEACHER_PW) {
    unlocked = true;
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("teacherContent").style.display = "block";
    renderTeacher();
  } else {
    document.getElementById("pwErr").textContent = "비밀번호가 맞지 않아요. 다시 입력해주세요.";
    document.getElementById("pwInput").value = "";
  }
}

// =========================================================
// 초기화
// =========================================================
(function init() {
  // 카드 생성
  const grid = document.getElementById("caseGrid");
  CASES.forEach(c => {
    const div = document.createElement("div");
    div.className = "card";
    div.id = "c" + c.id;
    div.innerHTML = `<span class="pill ${c.pill}">${c.tag}</span><div class="ctitle">${c.title}</div><div class="cprev">${c.prev}</div>`;
    div.addEventListener("click", () => selectCase(c.id));
    grid.appendChild(div);
  });

  buildCaseOptions("caseSelect", false);
  buildCaseOptions("filterCase", true);

  // 이벤트 연결
  document.getElementById("t0").addEventListener("click", () => go(0));
  document.getElementById("t1").addEventListener("click", () => go(1));
  document.getElementById("t2").addEventListener("click", () => go(2));
  document.getElementById("t3").addEventListener("click", () => go(3));

  document.getElementById("writeBtn").addEventListener("click", () => go(1));
  document.getElementById("filterCase").addEventListener("change", renderBoard);

  document.getElementById("submitBtn").addEventListener("click", () => {
    const caseId = parseInt(document.getElementById("caseSelect").value);
    const name   = document.getElementById("studentName").value.trim();
    const a1 = document.getElementById("ans1").value.trim();
    const a2 = document.getElementById("ans2").value.trim();
    const a3 = document.getElementById("ans3").value.trim();
    if (!caseId) { alert("사례를 선택해주세요"); return; }
    if (!name)   { alert("이름을 입력해주세요"); return; }
    if (!a1 && !a2 && !a3) { alert("의견을 한 가지 이상 써주세요"); return; }
    const c = CASES.find(x => x.id === caseId);
    posts.unshift({ caseId, caseTitle: c.title, name, a1, a2, a3, time: new Date().toISOString() });
    savePosts();
    document.getElementById("ans1").value = "";
    document.getElementById("ans2").value = "";
    document.getElementById("ans3").value = "";
    const msg = document.getElementById("okMsg");
    msg.style.display = "block";
    setTimeout(() => msg.style.display = "none", 2500);
  });

  document.getElementById("pwBtn").addEventListener("click", checkPw);
  document.getElementById("pwInput").addEventListener("keydown", e => { if (e.key === "Enter") checkPw(); });

  document.getElementById("lockBtn").addEventListener("click", () => {
    unlocked = false;
    document.getElementById("lockScreen").style.display = "block";
    document.getElementById("teacherContent").style.display = "none";
    document.getElementById("pwInput").value = "";
    document.getElementById("pwErr").textContent = "";
  });

  document.getElementById("clearBtn").addEventListener("click", () => {
    if (!confirm("정말 전체 의견을 삭제할까요?")) return;
    posts = [];
    savePosts();
    renderTeacher();
    renderBoard();
  });

  renderBoard();
})();
</script>
</body>
</html>
